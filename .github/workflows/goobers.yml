name: Build Goobers

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Compile Goobers
      run: |
        g++ -std=c++17 goobers.cpp -o goobers.exe -static
      # Added -std=c++17 to ensure std::filesystem is recognized.
      # The -static flag bundles dependencies so the EXE runs standalone.

    - name: Upload Goobers EXE
      uses: actions/upload-artifact@v4
      with:
        name: goobers-binaryv2
        path: goobers.exe
